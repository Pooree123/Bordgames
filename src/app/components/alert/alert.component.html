<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1055;">
  @for (alert of alertService.alerts(); track alert.id) {
    <div 
      class="toast show align-items-center glass-alert mb-2" 
      [ngClass]="getAlertClass(alert.type)"
      role="alert" 
      aria-live="assertive" 
      aria-atomic="true"
    >
      <div class="d-flex">
        <div class="toast-body fw-bold d-flex align-items-center gap-2">
          <span>{{ getIcon(alert.type) }}</span>
          {{ alert.message }}
        </div>
        <button 
          type="button" 
          class="btn-close btn-close-white me-2 m-auto" 
          (click)="alertService.remove(alert.id)"
          aria-label="Close"
        ></button>
      </div>
    </div>
  }
</div>
